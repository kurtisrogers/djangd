{% load djangd %}{% with input_id=id|default:"djangd-pw"|add:"-"|add:name %}
<div
  class="djangd-password-field {% if disabled %}djangd-password-field--disabled{% endif %} {% if error %}djangd-password-field--error{% endif %} {{ extra_classes }}"
  {{ attrs|djangd_attrs }}>
  <label class="djangd-password-field__label" for="{{ input_id }}">
    {{ label }}{% if required %} <span aria-hidden="true">*</span>{% endif %}
  </label>
  <div class="djangd-password-field__field">
    <input
      class="djangd-password-field__input mdc-text-field__input"
      id="{{ input_id }}"
      name="{{ name }}"
      type="password"
      autocomplete="{{ autocomplete }}"
      value="{{ value }}"
      {% if placeholder %}placeholder="{{ placeholder }}"{% endif %}
      {% if minlength %}minlength="{{ minlength }}"{% endif %}
      {% if required %}required aria-required="true"{% endif %}
      {% if disabled %}disabled{% endif %}
      {% if error %}aria-invalid="true"{% endif %}
      aria-describedby="{% if helper %}{{ input_id }}-helper{% endif %}"
    />
    <button type="button"
            class="djangd-password-field__toggle"
            aria-label="Show password"
            aria-pressed="false"
            data-toggle="password"
            aria-controls="{{ input_id }}">
      <i class="material-icons" aria-hidden="true">visibility</i>
    </button>
  </div>
  {% if helper %}<div class="djangd-password-field__helper" id="{{ input_id }}-helper">{{ helper }}</div>{% endif %}
</div>
{% endwith %}
