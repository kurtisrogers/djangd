{% load djangd %}<div class="mdc-data-table djangd-table {% if sticky_header %}mdc-data-table--sticky-header{% endif %} {{ extra_classes }}"
     {% if id %}id="{{ id }}"{% endif %}
     {{ attrs|djangd_attrs }}>
  <div class="mdc-data-table__table-container">
    <table class="mdc-data-table__table" aria-label="{{ caption }}">
      {% if caption %}<caption class="djangd-table__caption">{{ caption }}</caption>{% endif %}
      <thead>
        <tr class="mdc-data-table__header-row">
          {% for col in columns %}
            <th class="mdc-data-table__header-cell {% if col.numeric %}mdc-data-table__header-cell--numeric{% endif %}"
                role="columnheader"
                scope="col"
                {% if col.sort %}aria-sort="{{ col.sort }}"{% endif %}>
              {{ col.label }}
            </th>
          {% endfor %}
        </tr>
      </thead>
      <tbody class="mdc-data-table__content">
        {% for row in rows %}
          <tr class="mdc-data-table__row">
            {% for cell in row %}
              <td class="mdc-data-table__cell {% if cell.numeric %}mdc-data-table__cell--numeric{% endif %}">{{ cell.value|default:cell }}</td>
            {% endfor %}
          </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
