{% load djangd %}<div class="mdc-card djangd-card example-hero {{ extra_classes }}" id="{{ id }}">
  <div class="mdc-card__content djangd-card__content">
    <h1 class="mdc-typography mdc-typography--display-small djangd-typography djangd-typography--display-small" style="margin:0 0 8px;">{{ title }}</h1>
    {% if subtitle %}<p class="mdc-typography mdc-typography--body-large djangd-typography djangd-typography--body-large" style="margin:0 0 16px; color: var(--djangd-color-on-surface-variant);">{{ subtitle }}</p>{% endif %}
    {% component "button" label=cta_label href=cta_href variant="raised" / %}
  </div>
</div>
