{% load djangd %}{% with sheet_id=id|default:"djangd-sheet" %}
<div
  class="djangd-sheet djangd-sheet--{{ side }} {% if open %}djangd-sheet--open{% endif %} {{ extra_classes }}"
  id="{{ sheet_id }}"
  role="dialog"
  aria-modal="true"
  aria-hidden="{% if open %}false{% else %}true{% endif %}"
  {% if title %}aria-labelledby="{{ sheet_id }}-title"{% endif %}
  {{ attrs|djangd_attrs }}>
  <div class="djangd-sheet__scrim" aria-hidden="true" data-dismiss="sheet"></div>
  <aside class="djangd-sheet__panel" tabindex="-1">
    <header class="djangd-sheet__header">
      {% if title %}<h2 class="djangd-sheet__title" id="{{ sheet_id }}-title">{{ title }}</h2>{% endif %}
      {% if dismissible %}
        <button type="button" class="djangd-icon-button mdc-icon-button djangd-sheet__close" aria-label="Close" data-dismiss="sheet">
          <i class="material-icons" aria-hidden="true">close</i>
        </button>
      {% endif %}
    </header>
    <div class="djangd-sheet__body">{{ children }}</div>
    {% if actions %}
      <footer class="djangd-sheet__footer">
        {% for action in actions %}{{ action|safe }}{% endfor %}
      </footer>
    {% endif %}
  </aside>
</div>
{% endwith %}
