{% load djangd %}<ul class="mdc-image-list djangd-image-list {% if masonry %}mdc-image-list--masonry{% endif %} {% if with_text %}mdc-image-list--with-text-protection{% endif %} {{ extra_classes }}"
    role="list"
    {% if id %}id="{{ id }}"{% endif %}
    {{ attrs|djangd_attrs }}>
  {% for item in items %}
    <li class="mdc-image-list__item">
      <div class="mdc-image-list__image-aspect-container">
        <img class="mdc-image-list__image" src="{{ item.src }}" alt="{{ item.alt }}" />
      </div>
      {% if item.label or item.supporting %}
        <div class="mdc-image-list__supporting">
          <span class="mdc-image-list__label">{{ item.label }}</span>
        </div>
      {% endif %}
    </li>
  {% endfor %}
</ul>
