name: Test

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.11", "3.12"]
        django: ["4.2", "5.0"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ matrix.python }}" }
      - run: pip install -e ".[dev]" "Django~=${{ matrix.django }}.0"
      - run: pytest -q
